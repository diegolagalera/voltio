# ============================================
# Voltio — Production Docker Compose Stack
# ============================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
# ============================================

services:
  # ============================================
  # PostgreSQL + TimescaleDB
  # ============================================
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: voltio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voltio_network

  # ============================================
  # Mosquitto MQTT Broker
  # ============================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: voltio_mosquitto
    restart: unless-stopped
    ports:
      - "8883:8883"      # TLS — exposed for external gateways (RPi)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/password_file:/mosquitto/config/password_file:ro
      - ./mosquitto/config/acl_file:/mosquitto/config/acl_file:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voltio_network

  # ============================================
  # Backend — Node.js API + WebSocket + MQTT
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voltio_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_BACKEND_PASSWORD: ${MQTT_BACKEND_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      ESIOS_API_KEY: ${ESIOS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - voltio_network

  # ============================================
  # Frontend — Vite/Vue SPA served by Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    container_name: voltio_frontend
    restart: unless-stopped
    networks:
      - voltio_network

  # ============================================
  # Nginx — Reverse Proxy (HTTP only, no SSL for IP)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: voltio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/voltio.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - voltio_network

  # ============================================
  # pgAdmin 4 — Database Admin (internal only)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: voltio_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@voltio.es}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin1234}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voltio_network

  # ============================================
  # Portainer — Docker Container Manager
  # ============================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: voltio_portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - voltio_network

volumes:
  postgres_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  pgadmin_data:
    driver: local
  portainer_data:
    driver: local

networks:
  voltio_network:
    driver: bridge
