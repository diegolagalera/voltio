version: '3.8'

services:
  # ============================================
  # PostgreSQL + TimescaleDB + pgvector
  # ============================================
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: fpsaver_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fpsaver}
      POSTGRES_USER: ${POSTGRES_USER:-fpsaver_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fpsaver_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fpsaver_admin} -d ${POSTGRES_DB:-fpsaver}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fpsaver_network

  # ============================================
  # Mosquitto MQTT Broker (TLS + Auth)
  # ============================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fpsaver_mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_TLS_PORT:-8883}:8883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/config/password_file:/mosquitto/config/password_file
      - ./mosquitto/config/acl_file:/mosquitto/config/acl_file
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fpsaver_network

  # ============================================
  # pgAdmin 4 — Visual Database Manager
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fpsaver_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@fpsaver.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin1234}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fpsaver_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  fpsaver_network:
    driver: bridge
