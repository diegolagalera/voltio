# ============================================
# Mosquitto MQTT Broker Configuration
# FPSaver - Industrial Energy SaaS
# TLS + Authentication + ACLs
# ============================================

# General
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all

# ============================================
# Listener 1: MQTT over TLS (port 8883)
# Used by Raspberry Pi devices
# ============================================
listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false

# ============================================
# Listener 2: MQTT plain (port 1883)
# Internal only — backend service on Docker network
# ============================================
listener 1883 0.0.0.0
protocol mqtt

# ============================================
# Listener 3: WebSocket (port 9001)
# Frontend real-time (future use)
# ============================================
listener 9001
protocol websockets

# ============================================
# Authentication
# ============================================
allow_anonymous false
password_file /mosquitto/config/password_file

# ============================================
# Authorization (ACL)
# ============================================
acl_file /mosquitto/config/acl_file

# Connection settings
max_connections -1
max_inflight_messages 20
max_queued_messages 1000
