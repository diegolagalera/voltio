# ============================================
# Mosquitto MQTT Broker Configuration
# Voltio - Industrial Energy SaaS
# ============================================

# General
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# ============================================
# Listener 1: MQTT plain (port 1883)
# Used by backend (internal Docker network)
# and by gateways (exposed via Docker port mapping)
# ============================================
listener 1883 0.0.0.0
protocol mqtt

# ============================================
# Listener 2: WebSocket (port 9001)
# Frontend real-time (future use)
# ============================================
listener 9001
protocol websockets

# ============================================
# Authentication
# ============================================
allow_anonymous false
password_file /mosquitto/config/password_file

# ============================================
# Authorization (ACL)
# ============================================
acl_file /mosquitto/config/acl_file

# Connection settings
max_connections -1
max_inflight_messages 20
max_queued_messages 1000
